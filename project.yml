name: Whiplash
options:
  bundleIdPrefix: io.embed3d
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.2"

settings:
  base:
    SWIFT_VERSION: "6"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Manual
    Release:
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: $(TEAM_ID)

targets:
  Whiplash:
    type: application
    platform: macOS
    sources:
      - path: Whiplash
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.embed3d.whiplash
        INFOPLIST_FILE: Whiplash/Info.plist
        CODE_SIGN_ENTITLEMENTS: Whiplash/Whiplash.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    info:
      path: Whiplash/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Whiplash
        CFBundleDisplayName: Whiplash
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "2"
